targetNamespace: ""
parameters: {}
packages:
  - name: gallery
    shared: false
    # These are read from a .env file at the project root (see .env.example).
    # In App Platform you set the same names as component env vars instead.
    environment:
      SPACES_KEY: "${SPACES_KEY}"
      SPACES_SECRET: "${SPACES_SECRET}"
      SPACES_REGION: "${SPACES_REGION}"
      SPACES_BUCKET: "${SPACES_BUCKET}"
      SPACES_ENDPOINT: "${SPACES_ENDPOINT}"
      CDN_BASE: "${CDN_BASE}"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
      ALLOWED_ORIGIN: "${ALLOWED_ORIGIN}"
      SIGHTENGINE_USER: "${SIGHTENGINE_USER}"
      SIGHTENGINE_SECRET: "${SIGHTENGINE_SECRET}"
      MOD_HIGH: "${MOD_HIGH}"
      MOD_LOW: "${MOD_LOW}"
      MOD_SUGG: "${MOD_SUGG}"
    functions:
      - name: sign-upload
        runtime: "nodejs:18"
        web: true
      - name: moderate
        runtime: "nodejs:18"
        web: true
      - name: photos
        runtime: "nodejs:18"
        web: true
      - name: admin-pending
        runtime: "nodejs:18"
        web: true
      - name: admin-approve
        runtime: "nodejs:18"
        web: true
      - name: admin-reject
        runtime: "nodejs:18"
        web: true
